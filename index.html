<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi chú Từ Vựng Tiếng Anh</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sticker sticker-book"></div>
    <div class="sticker sticker-pen"></div>
    <div class="sticker sticker-laptop"></div>
    <div class="sticker sticker-board"></div>
    <div class="toolbar">
        <a id="feedback-link" href="https://forms.gle/QoDRRTei2h62y59P9" target="_blank">Góp ý</a>
        <a id="facebook-link" class="icon-link" href="https://www.facebook.com/anton.ngdan" target="_blank" aria-label="Facebook">
            <svg class="facebook-icon" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
        </a>
    </div>
    <h1>Ghi chú Từ Vựng Tiếng Anh</h1>
    <div id="notification" class="notification"></div>
    <form>
        <div class="form-group">
            <label for="english-word">Từ tiếng Anh</label>
            <input type="text" id="english-word" name="english-word">
        </div>
        <div class="form-group">
            <label for="vietnamese-meaning">Nghĩa tiếng Việt</label>
            <input type="text" id="vietnamese-meaning" name="vietnamese-meaning">
        </div>
        <div class="form-group">
            <label for="usage-example">Ví dụ sử dụng</label>
            <textarea id="usage-example" name="usage-example"></textarea>
        </div>
        <button type="submit">Lưu</button>
    </form>

    <section id="saved-notes">
        <h2>Danh sách từ đã lưu</h2>
        <input type="text" id="search" placeholder="Tìm kiếm từ đã lưu" />
        <ul id="notes-list"></ul>
    </section>
    <script src="script.js"></script>
</body>
</html>
